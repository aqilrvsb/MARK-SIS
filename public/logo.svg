<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Antenna line -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Antenna ball -->
  <circle cx="32" cy="4.5" r="3" fill="url(#grad)"/>

  <!-- Robot head -->
  <rect x="8" y="14" width="48" height="42" rx="10" ry="10" fill="url(#grad)"/>

  <!-- Left eye background -->
  <rect x="14" y="24" width="15" height="15" rx="4" ry="4" fill="rgba(255,255,255,0.2)"/>
  <!-- Left eye: Facebook "f" -->
  <text x="21.5" y="36.5" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="14" fill="white" text-anchor="middle" dominant-baseline="central">f</text>

  <!-- Right eye background -->
  <rect x="35" y="24" width="15" height="15" rx="4" ry="4" fill="rgba(255,255,255,0.2)"/>
  <!-- Right eye: bar chart -->
  <rect x="38" y="34" width="2.5" height="3" rx="0.5" fill="white"/>
  <rect x="41.5" y="30" width="2.5" height="7" rx="0.5" fill="white"/>
  <rect x="45" y="32" width="2.5" height="5" rx="0.5" fill="white"/>

  <!-- Mouth -->
  <path d="M24 46 Q32 51 40 46" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Ear bolts -->
  <circle cx="8" cy="35" r="2.5" fill="url(#grad)" stroke="white" stroke-width="1"/>
  <circle cx="56" cy="35" r="2.5" fill="url(#grad)" stroke="white" stroke-width="1"/>
</svg>
