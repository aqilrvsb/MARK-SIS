<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Antenna line -->
  <line x1="16" y1="3" x2="16" y2="7" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Antenna ball -->
  <circle cx="16" cy="2" r="1.5" fill="url(#g)"/>

  <!-- Robot head -->
  <rect x="4" y="7" width="24" height="21" rx="5" ry="5" fill="url(#g)"/>

  <!-- Left eye: Facebook "f" -->
  <rect x="7" y="12" width="7.5" height="7.5" rx="2" ry="2" fill="rgba(255,255,255,0.2)"/>
  <text x="10.75" y="17.5" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="7" fill="white" text-anchor="middle" dominant-baseline="central">f</text>

  <!-- Right eye: bar chart -->
  <rect x="17.5" y="12" width="7.5" height="7.5" rx="2" ry="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="19" y="17" width="1.5" height="1.5" rx="0.3" fill="white"/>
  <rect x="21" y="15" width="1.5" height="3.5" rx="0.3" fill="white"/>
  <rect x="23" y="16" width="1.5" height="2.5" rx="0.3" fill="white"/>

  <!-- Mouth -->
  <path d="M12 23 Q16 25.5 20 23" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Ear bolts -->
  <circle cx="4" cy="17.5" r="1.2" fill="url(#g)" stroke="white" stroke-width="0.6"/>
  <circle cx="28" cy="17.5" r="1.2" fill="url(#g)" stroke="white" stroke-width="0.6"/>
</svg>
